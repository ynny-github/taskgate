  [server]
  output_dir = "./tmp/agent-sandbox/command-router"

  [sandbox]
  build_context = "./docker/sandbox"
  dockerfile = "Dockerfile"
  image = "taskgate/sandbox:0.1.0"

  [allow_patterns]
  patterns = [
    "git *",
    "taskgate ai *",
    "go *"
  ]

  [nono]
  profile = "nono.jsonc"
  subcommand = "wrap"
